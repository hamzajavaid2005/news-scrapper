services:
  # Your News Scrapper Application
  news-scrapper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-scrapper
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}
      # Inngest dev mode - connect to local inngest container
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_DEV=1
    depends_on:
      inngest:
        condition: service_healthy
    networks:
      - news-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Inngest Dev Server
  inngest:
    image: inngest/inngest:latest
    container_name: inngest-dev
    command: >
      inngest dev 
      --no-discovery 
      -u http://news-scrapper:8000/api/inngest
    ports:
      - "8288:8288"   # Inngest Dashboard & API
    networks:
      - news-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  news-network:
    driver: bridge
