services:
  news-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-scraper
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}
      - INNGEST_BASE_URL=http://scraper-engine:8288
      - INNGEST_DEV=1
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_DATASET=${AXIOM_DATASET}
      - ADMIN_SECRET=${ADMIN_SECRET}
    depends_on:
      scraper-engine:
        condition: service_healthy
    networks:
      - news-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  scraper-engine:
    image: inngest/inngest:latest
    container_name: scraper-engine
    command: inngest dev --no-discovery -u http://news-scraper:3000/api/inngest
    ports:
      - "8388:8288"
    networks:
      - news-network
    restart: unless-stopped
    healthcheck:
      # Healthcheck runs INSIDE the container — Inngest listens on 8288 internally
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  news-network:
    driver: bridge
